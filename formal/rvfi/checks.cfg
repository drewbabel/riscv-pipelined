[options]
isa rv32i
solver yices

[depth]
insn      20
reg     5 20
pc_fwd  5 20
pc_bwd  5 20
unique  1 5 20
causal  5 20
liveness 1 5 20
cover   1 20

[defines]
`define RISCV_FORMAL
`define RISCV_FORMAL_ALIGNED_MEM

[verilog-files]
@basedir@/cores/@core@/wrapper.sv
@basedir@/cores/@core@/rv32i_pipe.v

[cover]
always @* if (!reset) cover (channel[0].cnt_insns >= 2);
