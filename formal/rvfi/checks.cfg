[options]
isa rv32i
solver yices

[csrs]
mscratch any
mstatus any
mtvec any
mepc any_mask="32'h fffffffc" zero_mask="32'h 00000003"
mcause any
mtval any
mie any
mcycle any
minstret any

[depth]
insn      20
reg     5 20
pc_fwd  5 20
pc_bwd  5 20
unique  1 5 20
causal  5 20
liveness 1 5 20
cover   1 20
csrw     20
csrc     1 5 20
csrc_inc 1 5 20
csrc_any_mepc  1 5 20
csrc_zero_mepc 1 5 20

[filter-checks]
- .*csrw_mepc.*

[defines]
`define RISCV_FORMAL
`define RISCV_FORMAL_ALIGNED_MEM

[verilog-files]
@basedir@/cores/@core@/wrapper.sv
@basedir@/cores/@core@/rv32i_pipe.v

[cover]
always @* if (!reset) cover (channel[0].cnt_insns >= 2);
