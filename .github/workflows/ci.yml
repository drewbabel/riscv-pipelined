name: CI

on: [push, pull_request]

jobs:
  testbench-list:
    runs-on: ubuntu-latest
    outputs:
      groups: ${{ steps.list.outputs.groups }}
    steps:
      - uses: actions/checkout@v4
      - name: Split testbenches into groups
        id: list
        run: |
          groups=$(ls tb/*_tb.sv | sed 's#.*/##;s#_tb\.sv$##' | grep -vE '^(coremark_boot|freertos_boot|gate_check)$' | python3 -c "import sys, json; n=[l.strip() for l in sys.stdin if l.strip()]; g=[[] for _ in range(4)]; [g[i % 4].append(x) for i, x in enumerate(n)]; print(json.dumps([' '.join(x) for x in g if x]))")
          echo "groups=$groups" >> "$GITHUB_OUTPUT"

  testbenches:
    needs: testbench-list
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: ${{ fromJSON(needs.testbench-list.outputs.groups) }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: |
          sudo grep -rlZ packages.microsoft.com /etc/apt/sources.list.d/ 2>/dev/null | sudo xargs -0 -r rm -f
          sudo apt-get update
          sudo apt-get install -y iverilog
      - name: Run the testbench group
        run: |
          for mod in ${{ matrix.group }}; do
            echo "== $mod =="
            make MOD="$mod"
          done

  formal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: YosysHQ/setup-oss-cad-suite@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install sv2v
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://github.com/zachjs/sv2v/releases/download/v0.0.13/sv2v-Linux.zip -o sv2v.zip
          unzip -j sv2v.zip -d "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: hazard unit formal
        run: make formal MOD=hazard_unit
      - name: irq formal
        run: make formal MOD=irq

  core-formal-list:
    runs-on: ubuntu-latest
    outputs:
      groups: ${{ steps.list.outputs.groups }}
    steps:
      - uses: actions/checkout@v4
      - name: Install sv2v
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://github.com/zachjs/sv2v/releases/download/v0.0.13/sv2v-Linux.zip -o sv2v.zip
          unzip -j sv2v.zip -d "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Clone riscv-formal
        run: |
          git clone https://github.com/YosysHQ/riscv-formal.git
          git -C riscv-formal checkout 2bd7410
      - name: Split checks into groups
        id: list
        env:
          RISCV_FORMAL_DIR: ${{ github.workspace }}/riscv-formal
        run: |
          groups=$(bash formal/rvfi/run.sh --list | python3 -c "import sys, json; n=[l.strip() for l in sys.stdin if l.strip()]; g=[[] for _ in range(8)]; [g[i % 8].append(x) for i, x in enumerate(n)]; print(json.dumps([' '.join(x) for x in g if x]))")
          echo "groups=$groups" >> "$GITHUB_OUTPUT"

  core-formal:
    needs: core-formal-list
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: ${{ fromJSON(needs.core-formal-list.outputs.groups) }}
    steps:
      - uses: actions/checkout@v4
      - uses: YosysHQ/setup-oss-cad-suite@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install sv2v
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://github.com/zachjs/sv2v/releases/download/v0.0.13/sv2v-Linux.zip -o sv2v.zip
          unzip -j sv2v.zip -d "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Clone riscv-formal
        run: |
          git clone https://github.com/YosysHQ/riscv-formal.git
          git -C riscv-formal checkout 2bd7410
      - name: Prove the group
        env:
          RISCV_FORMAL_DIR: ${{ github.workspace }}/riscv-formal
        run: bash formal/rvfi/run.sh ${{ matrix.group }}

  coremark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install RISC-V toolchain
        run: |
          sudo grep -rlZ packages.microsoft.com /etc/apt/sources.list.d/ 2>/dev/null | sudo xargs -0 -r rm -f
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-unknown-elf binutils-riscv64-unknown-elf
      - name: Alias toolchain to riscv64-elf-*
        run: |
          for t in gcc objcopy; do
            sudo ln -sf "$(command -v riscv64-unknown-elf-$t)" /usr/local/bin/riscv64-elf-$t
          done
      - name: Build CoreMark image
        run: make -C sw/coremark all

  freertos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog and RISC-V toolchain
        run: |
          sudo grep -rlZ packages.microsoft.com /etc/apt/sources.list.d/ 2>/dev/null | sudo xargs -0 -r rm -f
          sudo apt-get update
          sudo apt-get install -y iverilog gcc-riscv64-unknown-elf binutils-riscv64-unknown-elf
      - name: Alias toolchain to riscv64-elf-*
        run: |
          for t in gcc objcopy; do
            sudo ln -sf "$(command -v riscv64-unknown-elf-$t)" /usr/local/bin/riscv64-elf-$t
          done
      - name: Clone FreeRTOS-Kernel
        run: |
          git clone https://github.com/FreeRTOS/FreeRTOS-Kernel.git sw/FreeRTOS-Kernel
          git -C sw/FreeRTOS-Kernel checkout 9db704cd3bbe4963f9bd3de1f1161ea2cf90768b
      - name: Build FreeRTOS demo image
        run: make -C sw/freertos all
      - name: Run FreeRTOS queue demo testbench
        run: make MOD=freertos_boot

  gate-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: YosysHQ/setup-oss-cad-suite@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install sv2v and RISC-V toolchain
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://github.com/zachjs/sv2v/releases/download/v0.0.13/sv2v-Linux.zip -o sv2v.zip
          unzip -j sv2v.zip -d "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          sudo grep -rlZ packages.microsoft.com /etc/apt/sources.list.d/ 2>/dev/null | sudo xargs -0 -r rm -f
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-unknown-elf binutils-riscv64-unknown-elf
      - name: Alias toolchain to riscv64-elf-*
        run: |
          for t in gcc objcopy; do
            sudo ln -sf "$(command -v riscv64-unknown-elf-$t)" /usr/local/bin/riscv64-elf-$t
          done
      - name: Prove the pc_plus4 keep holds
        run: bash gate_check.sh

  ci-gate:
    if: always()
    needs: [testbench-list, testbenches, formal, core-formal-list, core-formal, coremark, freertos, gate-check]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all CI jobs succeeded
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: |
          echo "One or more required CI jobs did not succeed."
          exit 1
